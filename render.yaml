services:
  # The web service (Django backend)
  - type: web
    name: scholar-sync-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scholar-sync-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.13

databases:
  # The database service (PostgreSQL free tier)
  - name: scholar-sync-db
    databaseName: scholarsync
    user: scholar_user
    region: oregon
    plan: free
