services:
  # The web service (Django backend)
  - type: web
    name: scholar-sync-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    # Increased timeout to 300s for long AI analysis requests
    # 2 workers so health check stays alive during heavy AI processing
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 300 --workers 2"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scholar-sync-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.13"
      # --- AI API Keys: set these manually in Render Dashboard ---
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false

databases:
  # The database service (PostgreSQL free tier)
  - name: scholar-sync-db
    databaseName: scholarsync
    user: scholar_user
    region: oregon
    plan: free
